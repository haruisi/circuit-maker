<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>回路図メーカー v3.6</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #111;
      touch-action: none;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      background: #f5f5f5;
    }

    .toolbar {
      width: 86px;
      height: 100%;
      background: #ffffff;
      border-right: 1px solid #d8d8d8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 6px 88px;
      gap: 7px;
      overflow-y: auto;
      z-index: 30;
      touch-action: pan-y;
    }

    .tool-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 7px;
      margin-bottom: 3px;
      border-bottom: 1px solid #eeeeee;
    }

    .tool-btn,
    .bottom-btn {
      border: 1px solid #d2d2d2;
      background: #fff;
      color: #111;
      border-radius: 12px;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      line-height: 1.1;
      touch-action: none;
      cursor: pointer;
    }

    .tool-btn {
      width: 70px;
      min-height: 46px;
      font-size: 11px;
    }

    .tool-btn .icon {
      font-size: 18px;
      line-height: 1;
    }

    .tool-btn.active,
    .bottom-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .tool-btn.danger,
    .bottom-btn.danger {
      color: #b00020;
      border-color: #ddb4be;
    }

    .tool-btn.danger.active,
    .bottom-btn.danger.active {
      background: #b00020;
      color: #fff;
      border-color: #b00020;
    }

    .tool-btn.save,
    .bottom-btn.save {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .main {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-color: #fafafa;
      background-image:
        linear-gradient(#e3e3e3 1px, transparent 1px),
        linear-gradient(90deg, #e3e3e3 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: 0 0;
    }

    .status {
      position: absolute;
      top: 8px;
      left: 10px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #333;
      pointer-events: none;
      backdrop-filter: blur(8px);
      max-width: calc(100% - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
      touch-action: none;
    }

    .bottom-bar {
      position: fixed;
      left: 86px;
      right: 0;
      bottom: 0;
      height: 76px;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 12px calc(9px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.94);
      border-top: 1px solid #d8d8d8;
      backdrop-filter: blur(10px);
      touch-action: none;
    }

    .bottom-btn {
      min-width: 70px;
      height: 54px;
      border-radius: 15px;
      font-size: 12px;
    }

    .bottom-btn .icon {
      font-size: 20px;
      line-height: 1;
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="toolbar">
      <div class="tool-group">
        <button class="tool-btn" data-tool="junction">
          <span class="icon">●</span><span>接続点</span>
        </button>
        <button class="tool-btn" data-tool="ground">
          <span class="icon">⏚</span><span>アース</span>
        </button>
      </div>

      <div class="tool-group">
        <button class="tool-btn" data-tool="resistor">
          <span class="icon">▭</span><span>抵抗</span>
        </button>
        <button class="tool-btn" data-tool="variableResistor">
          <span class="icon">↗</span><span>可変抵抗</span>
        </button>
        <button class="tool-btn" data-tool="resistanceWire">
          <span class="icon">〜</span><span>抵抗線</span>
        </button>
        <button class="tool-btn" data-tool="sliderContact">
          <span class="icon">▼</span><span>可動接点</span>
        </button>
      </div>

      <div class="tool-group">
        <button class="tool-btn" data-tool="battery">
          <span class="icon">▌▏</span><span>電源</span>
        </button>
        <button class="tool-btn" data-tool="capacitor">
          <span class="icon">||</span><span>コンデンサ</span>
        </button>
        <button class="tool-btn" data-tool="metalPlate">
          <span class="icon">▐</span><span>金属板</span>
        </button>
      </div>

      <div class="tool-group">
        <button class="tool-btn" data-tool="galvanometer">
          <span class="icon">G</span><span>検流計</span>
        </button>
        <button class="tool-btn" data-tool="voltmeter">
          <span class="icon">V</span><span>電圧計</span>
        </button>
        <button class="tool-btn" data-tool="ammeter">
          <span class="icon">A</span><span>電流計</span>
        </button>
      </div>

      <div class="tool-group">
        <button class="tool-btn" id="undoBtn">
          <span class="icon">↶</span><span>戻る</span>
        </button>
        <button class="tool-btn" id="redoBtn">
          <span class="icon">↷</span><span>進む</span>
        </button>
      </div>
    </aside>

    <main class="main" id="main">
      <div class="status" id="status">導線：格子上をなぞる</div>
      <canvas id="canvas"></canvas>
    </main>

    <nav class="bottom-bar">
      <button class="bottom-btn active" data-tool="wire">
        <span class="icon">╱</span><span>導線</span>
      </button>
      <button class="bottom-btn danger" data-tool="eraser">
        <span class="icon">⌫</span><span>消す</span>
      </button>
      <button class="bottom-btn danger" id="clearBtn">
        <span class="icon">×</span><span>全消し</span>
      </button>
      <button class="bottom-btn save" id="saveBtn">
        <span class="icon">⬇</span><span>保存</span>
      </button>
      <button class="bottom-btn save" id="copyBtn">
        <span class="icon">⧉</span><span>コピー</span>
      </button>
    </nav>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const GRID = 32;
    const LINE_WIDTH = 3;
    const SAVE_SCALE = 3;
    const EXPORT_PADDING = 80;
    const ERASER_RADIUS = 28;

    let dpr = window.devicePixelRatio || 1;

    let currentTool = "wire";
    let items = [];
    let undoStack = [];
    let redoStack = [];

    let isDrawingWire = false;
    let currentWirePoints = [];
    let componentDraft = null;
    let pointDraft = null;

    let isErasing = false;
    let lastErasePoint = null;
    let eraserChanged = false;
    let eraserSnapshot = null;
    let eraserTrail = [];

    let gestureSuppressUntil = 0;
    const lastMultiTap = { 2: 0, 3: 0 };

    const twoPointTools = new Set([
      "resistor",
      "variableResistor",
      "resistanceWire",
      "battery",
      "capacitor",
      "metalPlate",
      "galvanometer",
      "voltmeter",
      "ammeter"
    ]);

    const pointTools = new Set([
      "junction",
      "ground",
      "sliderContact"
    ]);

    const toolLabels = {
      wire: "導線：格子上をなぞる",
      eraser: "消しゴム：なぞった下のものをまとめて消す",
      junction: "接続点：置きたい場所で離す",
      ground: "アース：置きたい場所で離す",
      resistor: "抵抗：端子から端子へドラッグ",
      variableResistor: "可変抵抗：端子から端子へドラッグ",
      resistanceWire: "抵抗線：端子から端子へドラッグ",
      sliderContact: "可動接点：置きたい場所で離す",
      battery: "電源：端子から端子へドラッグ",
      capacitor: "コンデンサー：端子から端子へドラッグ",
      metalPlate: "金属板：端から端へドラッグ",
      galvanometer: "検流計：端子から端子へドラッグ",
      voltmeter: "電圧計：端子から端子へドラッグ",
      ammeter: "電流計：端子から端子へドラッグ"
    };

    function onButton(el, handler) {
      let lastRun = 0;

      const run = e => {
        const now = performance.now();

        // iPad Safariでは touchstart / pointerdown / mousedown が連続することがあるため重複防止
        if (now - lastRun < 90) return;
        lastRun = now;

        e.preventDefault();
        e.stopPropagation();
        handler(e);
      };

      // 早い連打・素早い切替に対応するため、最速で拾えるイベントも併用
      el.addEventListener("touchstart", run, { passive: false });
      el.addEventListener("pointerdown", run, { passive: false });
      el.addEventListener("mousedown", run, { passive: false });
    }

    document.querySelectorAll("[data-tool]").forEach(btn => {
      onButton(btn, () => setTool(btn.dataset.tool));
    });

    onButton(document.getElementById("undoBtn"), undo);
    onButton(document.getElementById("redoBtn"), redo);
    onButton(document.getElementById("clearBtn"), clearAll);
    onButton(document.getElementById("saveBtn"), saveTransparentPNG);
    onButton(document.getElementById("copyBtn"), copyTransparentPNG);

    function setTool(nextTool) {
      currentTool = nextTool;
      cancelDrafts();

      document.querySelectorAll("[data-tool]").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(`[data-tool="${nextTool}"]`).forEach(b => b.classList.add("active"));

      updateStatus();
      draw();
    }

    function clearAll() {
      if (items.length === 0) return;

      saveHistory();
      items = [];
      cancelDrafts();
      draw();
    }

    canvas.addEventListener("touchstart", e => {
      const n = e.touches.length;

      if (n === 2 || n === 3) {
        const now = Date.now();

        if (now - lastMultiTap[n] < 360) {
          e.preventDefault();
          gestureSuppressUntil = now + 450;
          cancelDrafts();

          if (n === 2) undo();
          if (n === 3) redo();

          lastMultiTap[n] = 0;
        } else {
          lastMultiTap[n] = now;
        }
      }
    }, { passive: false });

    canvas.addEventListener("pointerdown", e => {
      if (Date.now() < gestureSuppressUntil) return;

      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);

      if (currentTool === "eraser") {
        startErasing(getCanvasPoint(e));
        draw();
        return;
      }

      const p = getGridPoint(e);

      if (currentTool === "wire") {
        isDrawingWire = true;
        currentWirePoints = [p];
        draw();
        return;
      }

      if (pointTools.has(currentTool)) {
        pointDraft = { kind: "point", type: currentTool, x: p.x, y: p.y };
        draw();
        return;
      }

      if (twoPointTools.has(currentTool)) {
        componentDraft = {
          kind: "component",
          type: currentTool,
          x1: p.x,
          y1: p.y,
          x2: p.x,
          y2: p.y
        };
        draw();
      }
    });

    canvas.addEventListener("pointermove", e => {
      if (Date.now() < gestureSuppressUntil) return;

      e.preventDefault();

      if (isErasing) {
        continueErasing(getCanvasPoint(e));
        draw();
        return;
      }

      const p = getGridPoint(e);

      if (isDrawingWire) {
        addWirePoint(p);
        draw();
        return;
      }

      if (pointDraft) {
        pointDraft.x = p.x;
        pointDraft.y = p.y;
        draw();
        return;
      }

      if (componentDraft) {
        componentDraft.x2 = p.x;
        componentDraft.y2 = p.y;
        draw();
      }
    });

    canvas.addEventListener("pointerup", e => {
      if (Date.now() < gestureSuppressUntil) return;

      e.preventDefault();

      if (isErasing) {
        finishErasing();
        draw();
        return;
      }

      if (isDrawingWire) {
        finalizeWire();
        return;
      }

      if (pointDraft) {
        saveHistory();
        items.push({ ...pointDraft });
        pointDraft = null;
        draw();
        return;
      }

      if (componentDraft) {
        const length = Math.hypot(componentDraft.x2 - componentDraft.x1, componentDraft.y2 - componentDraft.y1);
        if (length >= GRID) {
          saveHistory();
          items.push({ ...componentDraft });
        }

        componentDraft = null;
        draw();
      }
    });

    canvas.addEventListener("pointercancel", () => {
      if (isErasing) finishErasing();
      cancelDrafts();
      draw();
    });

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 200));

    function updateStatus() {
      statusEl.textContent = toolLabels[currentTool] || "";
    }

    function cancelDrafts() {
      isDrawingWire = false;
      currentWirePoints = [];
      componentDraft = null;
      pointDraft = null;
      isErasing = false;
      lastErasePoint = null;
      eraserTrail = [];
    }

    function saveHistory() {
      undoStack.push(JSON.stringify(items));
      if (undoStack.length > 120) undoStack.shift();
      redoStack = [];
    }

    function undo() {
      if (undoStack.length === 0) return;
      cancelDrafts();
      redoStack.push(JSON.stringify(items));
      items = JSON.parse(undoStack.pop());
      draw();
    }

    function redo() {
      if (redoStack.length === 0) return;
      cancelDrafts();
      undoStack.push(JSON.stringify(items));
      items = JSON.parse(redoStack.pop());
      draw();
    }

    function getCanvasPoint(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function getGridPoint(e) {
      const p = getCanvasPoint(e);
      return {
        x: Math.round(p.x / GRID) * GRID,
        y: Math.round(p.y / GRID) * GRID
      };
    }

    function startErasing(p) {
      isErasing = true;
      lastErasePoint = p;
      eraserTrail = [p];
      eraserChanged = false;
      eraserSnapshot = JSON.stringify(items);
      eraseSweepAt(p);
    }

    function continueErasing(p) {
      if (!lastErasePoint) {
        lastErasePoint = p;
        eraseSweepAt(p);
        return;
      }

      eraseSweepBetween(lastErasePoint, p);
      eraserTrail.push(p);
      if (eraserTrail.length > 80) eraserTrail.shift();
      lastErasePoint = p;
    }

    function finishErasing() {
      if (eraserChanged && eraserSnapshot !== null) {
        undoStack.push(eraserSnapshot);
        if (undoStack.length > 120) undoStack.shift();
        redoStack = [];
      }

      isErasing = false;
      lastErasePoint = null;
      eraserChanged = false;
      eraserSnapshot = null;
      eraserTrail = [];
    }

    function eraseSweepBetween(a, b) {
      const dist = Math.hypot(b.x - a.x, b.y - a.y);
      const steps = Math.max(1, Math.ceil(dist / 8));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        eraseSweepAt({
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t
        });
      }
    }

    function eraseSweepAt(p) {
      let changed = false;

      for (let i = items.length - 1; i >= 0; i--) {
        if (distanceToItem(p, items[i]) <= ERASER_RADIUS) {
          items.splice(i, 1);
          changed = true;
        }
      }

      if (changed) eraserChanged = true;
    }

    function addWirePoint(p) {
      if (currentWirePoints.length === 0) {
        currentWirePoints.push(p);
        return;
      }

      const last = currentWirePoints[currentWirePoints.length - 1];
      if (last.x === p.x && last.y === p.y) return;

      const dx = p.x - last.x;
      const dy = p.y - last.y;

      if (dx !== 0 && dy !== 0) {
        const mid = Math.abs(dx) >= Math.abs(dy) ? { x: p.x, y: last.y } : { x: last.x, y: p.y };
        pushSimplifiedPoint(mid);
        pushSimplifiedPoint(p);
      } else {
        pushSimplifiedPoint(p);
      }
    }

    function pushSimplifiedPoint(p) {
      const n = currentWirePoints.length;
      const last = currentWirePoints[n - 1];

      if (last && last.x === p.x && last.y === p.y) return;

      if (n >= 2) {
        const prev = currentWirePoints[n - 2];
        const sameHorizontal = prev.y === last.y && last.y === p.y;
        const sameVertical = prev.x === last.x && last.x === p.x;

        if (sameHorizontal || sameVertical) {
          currentWirePoints[n - 1] = p;
          return;
        }
      }

      currentWirePoints.push(p);
    }

    function finalizeWire() {
      isDrawingWire = false;

      if (currentWirePoints.length >= 2) {
        const unique = [];

        for (const p of currentWirePoints) {
          const last = unique[unique.length - 1];
          if (!last || last.x !== p.x || last.y !== p.y) unique.push(p);
        }

        if (unique.length >= 2) {
          saveHistory();
          items.push({ kind: "wire", points: unique });
        }
      }

      currentWirePoints = [];
      draw();
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      for (const item of items) drawItem(ctx, item, 1);

      if (isDrawingWire && currentWirePoints.length > 0) drawWire(ctx, currentWirePoints, 0.45);
      if (componentDraft) {
        drawItem(ctx, componentDraft, 0.35);
        drawEndpointPreview(ctx, componentDraft);
      }
      if (pointDraft) drawItem(ctx, pointDraft, 0.35);
      if (isErasing) drawEraserTrail(ctx);
    }

    function setupLine(c, alpha = 1) {
      c.globalAlpha = alpha;
      c.strokeStyle = "#111";
      c.fillStyle = "#111";
      c.lineWidth = LINE_WIDTH;
      c.lineCap = "round";
      c.lineJoin = "round";
      c.font = "bold 24px -apple-system, BlinkMacSystemFont, sans-serif";
      c.textAlign = "center";
      c.textBaseline = "middle";
    }

    function drawItem(c, item, alpha = 1) {
      if (item.kind === "wire") return drawWire(c, item.points, alpha);
      if (item.kind === "point") return drawPointComponent(c, item, alpha);
      if (item.kind === "component") return drawTwoPointComponent(c, item, alpha);
    }

    function drawWire(c, points, alpha = 1) {
      if (points.length < 2) return;
      c.save();
      setupLine(c, alpha);
      c.beginPath();
      c.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) c.lineTo(points[i].x, points[i].y);
      c.stroke();
      c.restore();
    }

    function drawEraserTrail(c) {
      if (eraserTrail.length === 0) return;

      c.save();
      c.globalAlpha = 0.18;
      c.strokeStyle = "#b00020";
      c.fillStyle = "#b00020";
      c.lineWidth = ERASER_RADIUS * 2;
      c.lineCap = "round";
      c.lineJoin = "round";

      c.beginPath();
      c.moveTo(eraserTrail[0].x, eraserTrail[0].y);
      for (let i = 1; i < eraserTrail.length; i++) c.lineTo(eraserTrail[i].x, eraserTrail[i].y);
      c.stroke();

      const last = eraserTrail[eraserTrail.length - 1];
      c.beginPath();
      c.arc(last.x, last.y, ERASER_RADIUS, 0, Math.PI * 2);
      c.fill();

      c.restore();
    }

    function drawEndpointPreview(c, item) {
      c.save();
      c.globalAlpha = 0.35;
      c.fillStyle = "#111";
      c.beginPath();
      c.arc(item.x1, item.y1, 5, 0, Math.PI * 2);
      c.fill();
      c.beginPath();
      c.arc(item.x2, item.y2, 5, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }

    function drawPointComponent(c, item, alpha = 1) {
      c.save();
      setupLine(c, alpha);
      c.translate(item.x, item.y);

      if (item.type === "junction") {
        c.beginPath();
        c.arc(0, 0, 6, 0, Math.PI * 2);
        c.fill();
      }

      if (item.type === "ground") {
        c.beginPath();
        c.moveTo(0, -32);
        c.lineTo(0, 0);
        c.stroke();
        c.beginPath();
        c.moveTo(-24, 0);
        c.lineTo(24, 0);
        c.moveTo(-16, 11);
        c.lineTo(16, 11);
        c.moveTo(-8, 22);
        c.lineTo(8, 22);
        c.stroke();
      }

      if (item.type === "sliderContact") {
        c.beginPath();
        c.arc(0, 0, 6, 0, Math.PI * 2);
        c.fill();
        c.beginPath();
        c.moveTo(0, -38);
        c.lineTo(0, -7);
        c.stroke();
        c.beginPath();
        c.moveTo(-11, -24);
        c.lineTo(0, -7);
        c.lineTo(11, -24);
        c.stroke();
      }

      c.restore();
    }

    function drawTwoPointComponent(c, item, alpha = 1) {
      const dx = item.x2 - item.x1;
      const dy = item.y2 - item.y1;
      const length = Math.hypot(dx, dy);
      if (length < 1) return;

      const angle = Math.atan2(dy, dx);
      const cx = (item.x1 + item.x2) / 2;
      const cy = (item.y1 + item.y2) / 2;

      c.save();
      setupLine(c, alpha);
      c.translate(cx, cy);
      c.rotate(angle);

      if (item.type === "resistor") drawResistorLocal(c, length);
      if (item.type === "variableResistor") drawVariableResistorLocal(c, length);
      if (item.type === "resistanceWire") drawResistanceWireLocal(c, length);
      if (item.type === "battery") drawBatteryLocal(c, length);
      if (item.type === "capacitor") drawCapacitorLocal(c, length);
      if (item.type === "metalPlate") drawMetalPlateLocal(c, length);
      if (item.type === "galvanometer") drawMeterLocal(c, length, "G");
      if (item.type === "voltmeter") drawMeterLocal(c, length, "V");
      if (item.type === "ammeter") drawMeterLocal(c, length, "A");

      c.restore();
    }

    function drawResistorLocal(c, length) {
      const left = -length / 2;
      const right = length / 2;
      let bodyW = Math.min(64, Math.max(28, length * 0.55));

      if (bodyW > length - 8) bodyW = Math.max(12, length - 8);

      const bodyH = 24;
      const bodyLeft = -bodyW / 2;
      const bodyRight = bodyW / 2;

      c.beginPath();
      c.moveTo(left, 0);
      c.lineTo(bodyLeft, 0);
      c.moveTo(bodyRight, 0);
      c.lineTo(right, 0);
      c.stroke();

      c.beginPath();
      c.rect(bodyLeft, -bodyH / 2, bodyW, bodyH);
      c.stroke();
    }

    function drawVariableResistorLocal(c, length) {
      drawResistorLocal(c, length);
      const arrowLength = Math.min(74, Math.max(38, length * 0.7));
      const x1 = -arrowLength / 2;
      const y1 = 28;
      const x2 = arrowLength / 2;
      const y2 = -28;

      c.beginPath();
      c.moveTo(x1, y1);
      c.lineTo(x2, y2);
      c.stroke();
      drawArrowHead(c, x2, y2, Math.atan2(y2 - y1, x2 - x1));
    }

    function drawResistanceWireLocal(c, length) {
      const left = -length / 2;
      const right = length / 2;
      c.beginPath();
      c.moveTo(left, 0);
      c.lineTo(right, 0);
      c.stroke();

      c.save();
      c.lineWidth = 1.8;
      c.beginPath();
      for (let x = left; x <= right; x += 2) {
        const y = Math.sin((x - left) / 10 * Math.PI * 2) * 6;
        if (x === left) c.moveTo(x, y);
        else c.lineTo(x, y);
      }
      c.stroke();
      c.restore();
    }

    function drawBatteryLocal(c, length) {
      const left = -length / 2;
      const right = length / 2;
      const gap = Math.min(14, length * 0.18);
      const shortH = 30;
      const longH = 52;

      c.beginPath();
      c.moveTo(left, 0);
      c.lineTo(-gap, 0);
      c.moveTo(gap, 0);
      c.lineTo(right, 0);
      c.stroke();

      c.beginPath();
      c.moveTo(-gap, -shortH / 2);
      c.lineTo(-gap, shortH / 2);
      c.moveTo(gap, -longH / 2);
      c.lineTo(gap, longH / 2);
      c.stroke();
    }

    function drawCapacitorLocal(c, length) {
      const left = -length / 2;
      const right = length / 2;
      const gap = Math.min(14, length * 0.18);
      const h = 54;

      c.beginPath();
      c.moveTo(left, 0);
      c.lineTo(-gap, 0);
      c.moveTo(gap, 0);
      c.lineTo(right, 0);
      c.stroke();

      c.beginPath();
      c.moveTo(-gap, -h / 2);
      c.lineTo(-gap, h / 2);
      c.moveTo(gap, -h / 2);
      c.lineTo(gap, h / 2);
      c.stroke();
    }

    function drawMetalPlateLocal(c, length) {
      const left = -length / 2;
      const right = length / 2;
      c.save();
      c.lineWidth = 7;
      c.beginPath();
      c.moveTo(left, 0);
      c.lineTo(right, 0);
      c.stroke();
      c.restore();
    }

    function drawMeterLocal(c, length, label) {
      const left = -length / 2;
      const right = length / 2;
      const r = Math.min(25, Math.max(17, length * 0.28));

      c.beginPath();
      c.moveTo(left, 0);
      c.lineTo(-r, 0);
      c.moveTo(r, 0);
      c.lineTo(right, 0);
      c.stroke();

      c.beginPath();
      c.arc(0, 0, r, 0, Math.PI * 2);
      c.stroke();
      c.fillText(label, 0, 1);
    }

    function drawArrowHead(c, x, y, angle) {
      const size = 10;
      c.beginPath();
      c.moveTo(x, y);
      c.lineTo(x - size * Math.cos(angle - Math.PI / 6), y - size * Math.sin(angle - Math.PI / 6));
      c.moveTo(x, y);
      c.lineTo(x - size * Math.cos(angle + Math.PI / 6), y - size * Math.sin(angle + Math.PI / 6));
      c.stroke();
    }

    function distanceToItem(p, item) {
      if (item.kind === "point") return Math.hypot(p.x - item.x, p.y - item.y);

      if (item.kind === "component") {
        return distancePointToSegment(p, { x: item.x1, y: item.y1 }, { x: item.x2, y: item.y2 });
      }

      if (item.kind === "wire") {
        let best = Infinity;
        for (let i = 0; i < item.points.length - 1; i++) {
          best = Math.min(best, distancePointToSegment(p, item.points[i], item.points[i + 1]));
        }
        return best;
      }

      return Infinity;
    }

    function distancePointToSegment(p, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);

      let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const x = a.x + t * dx;
      const y = a.y + t * dy;
      return Math.hypot(p.x - x, p.y - y);
    }

    function getBounds() {
      if (items.length === 0) return null;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

      for (const item of items) {
        if (item.kind === "wire") {
          for (const p of item.points) {
            minX = Math.min(minX, p.x);
            minY = Math.min(minY, p.y);
            maxX = Math.max(maxX, p.x);
            maxY = Math.max(maxY, p.y);
          }
        }

        if (item.kind === "component") {
          minX = Math.min(minX, item.x1, item.x2);
          minY = Math.min(minY, item.y1, item.y2);
          maxX = Math.max(maxX, item.x1, item.x2);
          maxY = Math.max(maxY, item.y1, item.y2);
        }

        if (item.kind === "point") {
          minX = Math.min(minX, item.x);
          minY = Math.min(minY, item.y);
          maxX = Math.max(maxX, item.x);
          maxY = Math.max(maxY, item.y);
        }
      }

      return {
        minX: minX - EXPORT_PADDING,
        minY: minY - EXPORT_PADDING,
        maxX: maxX + EXPORT_PADDING,
        maxY: maxY + EXPORT_PADDING
      };
    }

    function createExportBlob(callback) {
      const bounds = getBounds();

      if (!bounds) {
        alert("まだ何も描かれていません。");
        return;
      }

      const w = Math.max(160, bounds.maxX - bounds.minX);
      const h = Math.max(160, bounds.maxY - bounds.minY);

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = Math.ceil(w * SAVE_SCALE);
      exportCanvas.height = Math.ceil(h * SAVE_SCALE);

      const ex = exportCanvas.getContext("2d");
      ex.setTransform(SAVE_SCALE, 0, 0, SAVE_SCALE, -bounds.minX * SAVE_SCALE, -bounds.minY * SAVE_SCALE);

      for (const item of items) drawItem(ex, item, 1);

      exportCanvas.toBlob(blob => {
        if (!blob) {
          alert("PNGの作成に失敗しました。");
          return;
        }
        callback(blob);
      }, "image/png");
    }

    function saveTransparentPNG() {
      createExportBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "circuit-transparent.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    }

    async function copyTransparentPNG() {
      createExportBlob(async blob => {
        if (!navigator.clipboard || !window.ClipboardItem) {
          alert("この環境では画像コピーに対応していません。PNG保存を使ってください。");
          return;
        }

        try {
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          statusEl.textContent = "PNGをコピーしました。GoodNotesに貼り付けできます。";
        } catch (err) {
          alert("画像コピーに失敗しました。PNG保存を使ってください。");
        }
      });
    }

    updateStatus();
    setTimeout(resizeCanvas, 0);
    setTimeout(resizeCanvas, 250);
  </script>
</body>
</html>
